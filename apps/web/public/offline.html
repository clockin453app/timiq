<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#eef0f2" />
    <title>TimIQ — Offline</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Calibri, Arial, system-ui, sans-serif;
        background: #eef0f2;
        color: #1a1d21;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        padding-bottom: max(1.5rem, env(safe-area-inset-bottom, 0px));
      }
      .card {
        max-width: 22rem;
        width: 100%;
        border: 1px solid #b8c0c8;
        background: #fff;
        padding: 1.5rem;
        border-radius: 2px;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.125rem;
      }
      p {
        margin: 0 0 1rem;
        font-size: 0.875rem;
        color: #3d4349;
        line-height: 1.45;
      }
      a {
        display: inline-block;
        font-size: 0.875rem;
        font-weight: 600;
        color: #2f6fae;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>TimIQ needs a network connection for sign-in, clocking, payroll, and documents. Check your connection, then try again.</p>
      <p><a href="/">Return to home</a></p>
    </div>
  </body>
</html>
