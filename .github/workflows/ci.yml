# TimIQ — CI (no secrets, no deploy)
# Requires: Python 3.11+ and Node 20+ on ubuntu-latest (adjust versions to match your team).

name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    env:
      APP_ENV: test
      TIMIQ_ENV: test
      SESSION_SECRET: ci-test-session-secret-not-production
      DATABASE_URL: postgresql+psycopg://ci_user:ci_password@localhost:5432/ci_db
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      WEB_ORIGIN: http://localhost:3000
      SESSION_COOKIE_SAMESITE: lax
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Pytest
        run: python -m pytest tests -q

      - name: Compileall
        run: python -m compileall app

      - name: Import app
        run: python -c "from app.main import app; print('app import ok')"

      - name: Alembic heads
        run: python -m alembic heads

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
